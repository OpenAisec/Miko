id: subfinder
category: asset
name: 'subfinder'
short_description: '被动子域名发现工具，使用多个数据源'
description: |
  Subfinder是一个被动子域名发现工具，通过查询多个数据源来发现子域名。
  
  **主要功能：**
  - 被动子域名发现
  - 多个数据源集成
  - 快速扫描
  - 支持API密钥配置
  
  **使用场景：**
  - 子域名枚举
  - 资产发现
  - Bug bounty侦察
  - 渗透测试信息收集
invoke: cli
bin: 'subfinder'
usage: 'subfinder -d <domain> [-silent <silent>] [-all <all_sources>] [<additional_args>]'
builtin: true
bundled: true
