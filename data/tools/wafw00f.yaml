  - 绕过技术检测
  
  **使用场景：**
  - WAF识别
  - 安全测试
  - 渗透测试
  - 安全评估
invoke: cli
bin: 'wafw00f'
usage: 'wafw00f <target> [<additional_args>]'
builtin: true
bundled: true
