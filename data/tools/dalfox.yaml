id: dalfox
category: web
name: 'dalfox'
short_description: '高级XSS漏洞扫描器'
description: |
  Dalfox是一个高级XSS漏洞扫描器，支持多种XSS检测技术。
  
  **主要功能：**
  - XSS漏洞检测
  - 盲XSS测试
  - DOM挖掘
  - 字典挖掘
  
  **使用场景：**
  - XSS漏洞测试
  - Web应用安全测试
  - Bug bounty侦察
  - 安全测试
invoke: cli
bin: 'dalfox'
usage: 'dalfox <url> [--pipe <pipe_mode>] [--blind <blind>] [--mining-dom <mining_dom>] [--mining-dict <mining_dict>] [<additional_args>]'
builtin: true
bundled: true
